
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photography</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #001f3f, #87CEEB);
            background-attachment: fixed;
            color: white;
            min-height: 100vh;
        }

        nav {
            display: flex;
            justify-content: center;
            background: rgba(0, 0, 0, 0.2);
            padding: 20px;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
            transition: color 0.3s;
        }

        nav a:hover { color: #87CEEB; }

        h1 {
            text-align: center;
            margin-top: 40px;
            font-size: 3rem;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 40px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .gallery-item {
            text-align: center;
            opacity: 0;
            animation: foldFade 1.2s ease-out forwards;
            transform-origin: top;
        }

        .photo-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.3s ease;
        }

        .photo-box:hover {
            transform: translateY(-10px);
            border-color: white;
        }

        .photo-box img {
            width: 100%;
            height: auto; 
            display: block;
            border-radius: 10px;
            object-fit: contain; 
        }

        .gallery-item p {
            margin-top: 15px;
            font-weight: bold;
            font-size: 1.2rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        @keyframes foldFade {
            0% { opacity: 0; transform: perspective(1000px) rotateX(-90deg); }
            100% { opacity: 1; transform: perspective(1000px) rotateX(0deg); }
        }

        /* Animation Delays for smooth sequencing */
        .gallery-item:nth-child(1) { animation-delay: 0.1s; }
        .gallery-item:nth-child(2) { animation-delay: 0.2s; }
        .gallery-item:nth-child(3) { animation-delay: 0.3s; }
        .gallery-item:nth-child(4) { animation-delay: 0.4s; }
        .gallery-item:nth-child(5) { animation-delay: 0.5s; }
        .gallery-item:nth-child(6) { animation-delay: 0.6s; }
        .gallery-item:nth-child(7) { animation-delay: 0.7s; }
        .gallery-item:nth-child(8) { animation-delay: 0.8s; }
        .gallery-item:nth-child(9) { animation-delay: 0.9s; }
        .gallery-item:nth-child(10) { animation-delay: 1.0s; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="design.html">Design</a>
        <a href="photography.html">Photography</a>

    </nav>
